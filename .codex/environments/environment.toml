# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "jottrace"

[setup]
script = '''
set -eu

if ! command -v cargo >/dev/null 2>&1; then
  echo "cargo is required. Install Rust stable with rustup: https://rustup.rs/"
  exit 1
fi

if command -v rustup >/dev/null 2>&1; then
  rustup component add rustfmt clippy
fi

cargo fetch --locked
'''

[[actions]]
name = "Check"
icon = "tool"
command = "cargo fmt --check && cargo clippy --all-targets -- -D warnings && cargo test"

[[actions]]
name = "Doctor"
icon = "tool"
command = "JOTTRACE_HOME=$(mktemp -d /tmp/jottrace-codex-doctor.XXXXXX) cargo run -- doctor"
